[metadata]
name = "dot"
description = "Scripts in ~/dotfiles/bin"

[source]
command = "find \"$HOME/dotfiles/bin\" -maxdepth 1 -type f ! -name 'lib-*.sh' -print | sort"

[preview]
command = "sh -c 'case \"$1\" in *.jl) bat -n --color=always \"$1\" ;; *) \"$1\" --help 2>&1 || bat -n --color=always \"$1\" ;; esac' _ '{}'"

[ui.preview_panel]
size = 60
