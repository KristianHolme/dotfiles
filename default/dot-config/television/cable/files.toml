[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd", "bat", "trash-put"]

[source]
command = ["fd -t f", "fd -t f -H"]

[preview]
command = "bat -n --color=always '{}'"
env = { BAT_THEME = "ansi" }

[keybindings]
shortcut = "f1"
ctrl-e = "actions:edit"
f12 = "actions:edit"
alt-d = ["actions:delete", "reload_source"]
ctrl-up = "actions:goto_parent_dir"

[actions.edit]
description = "Open selected entries in $EDITOR (default: nvim)"
command = "${EDITOR:-nvim} '{}'"
shell = "bash"
mode = "execute"

[actions.delete]
description = "Move selected files to trash (trash-cli; use trash-restore to recover)"
command = "trash-put {}"
shell = "bash"
mode = "fork"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv files .."
mode = "execute"
