[mgr]
ratio = [1, 2, 4]
linemode = "size"

[[plugin.prepend_previewers]]
url = "*.{md,markdown}"
run = "mdv-previewer"

[[plugin.prepend_preloaders]]
url = "*.{md,markdown}"
run = "mdv-previewer"

[[plugin.prepend_fetchers]]
id = "git"    # Remove if Yazi > v26.1.22
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
id = "git"    # Remove if Yazi > v26.1.22
url = "*/"
run = "git"
group = "git"
