[mgr]
ratio = [1, 2, 4]
linemode = "size"

# Zoom/image preview ceiling (defaults 600×900 are too small for zoom.yazi).
# Effective size is still min(these, preview pane pixels).
[preview]
max_width = 4096
max_height = 4096

[[plugin.prepend_previewers]]
url = "*.{md,markdown}"
run = "mdv-previewer"

[[plugin.prepend_preloaders]]
url = "*.{md,markdown}"
run = "mdv-previewer"

[[plugin.prepend_fetchers]]
id = "git"    # Remove if Yazi > v26.1.22
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
id = "git"    # Remove if Yazi > v26.1.22
url = "*/"
run = "git"
group = "git"
