################################################################
# auto — terminal 16-color palette (ANSI 0–15)                 #
################################################################
#
# Values "0" through "15" are passed to lipgloss as ANSI basic colors: they use
# whatever your terminal has configured for palette slots 0–15 (often set via
# OSC 4 / "palette" entries in the terminal config). They are not fixed hex
# colors; the same index can look different in another terminal or profile.
#
# Default character background often comes from the terminal's configured
# default background, which may differ from palette slot 0. Many setups use
# slot 0 as a "black" or surface color, not the main window background. If
# large UI areas look too light or dark compared to the rest of the terminal,
# try superfile's transparent_background option so panel fills don't paint over
# the terminal default background.
#
# See: https://superfile.dev/configure/custom-theme/

###############################################################################
#                           Code Syntax Highlighting                          #
###############################################################################

code_syntax_highlight = "base16-snazzy"

# It's recommended to use the option `code_previewer = "bat"` in the superfile
# config to get code preview with terminal-defined colors.

###############################################################################
#                                 Base Colors                                 #
###############################################################################

#-- Full Screen
full_screen_fg = "15"
full_screen_bg = "0"

#-- Gradient
gradient_color = ["4", "5"]

#-- File Panel
file_panel_fg = "15"
file_panel_bg = "0"
file_panel_border = "8"
file_panel_border_active = "12"
file_panel_top_directory_icon = "6"
file_panel_top_path = "4"
file_panel_item_selected_fg = "14"
file_panel_item_selected_bg = "8"

directory_icon_color = "6"

#-- Footer
footer_fg = "15"
footer_bg = "0"
footer_border = "8"
footer_border_active = "6"

#-- Sidebar
sidebar_fg = "15"
sidebar_bg = "0"
sidebar_title = "6"
sidebar_border = "8"
sidebar_border_active = "13"
sidebar_item_selected_fg = "14"
sidebar_item_selected_bg = "8"
sidebar_divider = "8"

#-- Modals
modal_fg = "15"
modal_bg = "0"
modal_border_active = "6"
modal_cancel_fg = "0"
modal_cancel_bg = "3"
modal_confirm_fg = "0"
modal_confirm_bg = "2"

#-- Help Menu
help_menu_hotkey = "14"
help_menu_title = "6"

#-- Special
cursor = "11"
correct = "2"
error = "1"
hint = "6"
cancel = "3"
