# Office Desk Setup for Sibir2 Profile
# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Office desk with specific monitor setup
env = GDK_SCALE,1

# Left: Dell U2424HE portrait, 90° counter-clockwise (transform 3 = 270° CW)
# Logical size after rotation: 1080x1920; vertically centered against Samsung (1728 tall)
monitor = desc:Dell Inc. DELL U2424HE, 1920x1080@120, 0x-96, 1, transform, 3

# Main: Samsung U32E850 4K @ 1.25 scale → 3072x1728 logical
monitor = desc:Samsung Electric Company U32E850, 3840x2160@60, 1080x0, 1.25

# Right: laptop (internal), scale 2 → 1280x720 logical
monitor = desc:BOE 0x0AFE, 2560x1440@60, 4152x0, 2

# Fallback for any other connected monitors
monitor = , preferred, auto, 1

source = tiling.conf

debug:disable_logs = false
